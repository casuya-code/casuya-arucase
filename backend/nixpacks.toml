# Railway/Nixpacks — backend API (root directory should be `backend/`)
# PostgreSQL client: pg_dump / pg_restore for admin backups
# Chrome system libs: installed via `puppeteer browsers install --install-deps`
# (uses deb.deps + apt-get satisfy — correct on Ubuntu 24.04 Noble, incl. t64 packages).
# Do NOT list legacy apt names (libasound2, etc.) here — Noble has no install candidate.

[phases.setup]
aptPkgs = ["postgresql-client"]

[phases.build]
cmds = [
  "npx puppeteer browsers install chrome --install-deps",
  "node scripts/verify-puppeteer-chrome.js",
]

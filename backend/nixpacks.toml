# pg_dump / pg_restore for admin database backups (Railway API service)
# chromium apt: shared libs for Puppeteer's bundled Chrome (not /usr/bin/chromium-browser — snap stub on Noble)
[phases.setup]
aptPkgs = [
  "postgresql-client",
  "chromium",
  "fonts-liberation",
]

[phases.build]
cmds = ["npx puppeteer browsers install chrome"]
